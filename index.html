<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Bowl 2025 — Skills & Traits Reference</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap');

  :root {
    --pitch: #1a3d0f;
    --pitch-dark: #0f2408;
    --gold: #c8a84b;
    --gold-light: #e8c96a;
    --red: #9b1f1f;
    --red-light: #c42626;
    --parchment: #f5f0e4;
    --parchment-dark: #e8dfc8;
    --ink: #1a1208;
    --muted: #5a4a30;
    --cat-ag: #1a6b9a;
    --cat-dev: #7a1f7a;
    --cat-gen: #1a7a2a;
    --cat-mut: #8a4a00;
    --cat-pas: #1a5a8a;
    --cat-str: #8a1a1a;
    --cat-trait: #2a2a5a;
    --shadow: 0 2px 12px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--pitch-dark);
    font-family: 'Source Sans 3', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #0a1504 0%, var(--pitch-dark) 100%);
    border-bottom: 3px solid var(--gold);
    padding: 20px 24px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  header p {
    color: #aaa;
    font-size: 12px;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* CONTROLS */
  .controls {
    background: var(--pitch);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 2px solid rgba(200,168,75,0.3);
    position: sticky;
    top: 77px;
    z-index: 99;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 8px 14px;
    color: var(--parchment);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .search-box::placeholder { color: rgba(255,255,255,0.35); }
  .search-box:focus { border-color: var(--gold-light); }

  .cat-btns { display: flex; gap: 6px; flex-wrap: wrap; }

  .cat-btn {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .cat-btn:hover { transform: translateY(-1px); }
  .cat-btn.active { color: #fff; }

  .btn-all    { border-color: var(--gold); color: var(--gold); }
  .btn-all.active { background: var(--gold); color: var(--ink); }
  .btn-ag     { border-color: var(--cat-ag); color: var(--cat-ag); }
  .btn-ag.active  { background: var(--cat-ag); }
  .btn-dev    { border-color: #b05ab0; color: #b05ab0; }
  .btn-dev.active { background: #7a1f7a; }
  .btn-gen    { border-color: #3aaa4a; color: #3aaa4a; }
  .btn-gen.active { background: var(--cat-gen); }
  .btn-mut    { border-color: #cc7a20; color: #cc7a20; }
  .btn-mut.active { background: var(--cat-mut); }
  .btn-pas    { border-color: #3a8adc; color: #3a8adc; }
  .btn-pas.active { background: var(--cat-pas); }
  .btn-str    { border-color: #d44a4a; color: #d44a4a; }
  .btn-str.active { background: var(--cat-str); }
  .btn-trait  { border-color: #8a8ad4; color: #8a8ad4; }
  .btn-trait.active { background: var(--cat-trait); }

  /* LAYOUT */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* SKILL CARD */
  .skill-card {
    background: var(--parchment);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid rgba(200,168,75,0.25);
  }
  .skill-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.5);
  }
  .skill-card.hidden { display: none; }

  .card-header {
    padding: 12px 16px 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .card-header-left { flex: 1; }

  .skill-name {
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--ink);
    line-height: 1.2;
  }

  .skill-meta {
    display: flex;
    gap: 6px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    font-weight: 600;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.8px;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    color: #fff;
  }

  .badge-ag    { background: var(--cat-ag); }
  .badge-dev   { background: var(--cat-dev); }
  .badge-gen   { background: var(--cat-gen); }
  .badge-mut   { background: var(--cat-mut); }
  .badge-pas   { background: var(--cat-pas); }
  .badge-str   { background: var(--cat-str); }
  .badge-trait { background: var(--cat-trait); }
  .badge-passive { background: #666; }
  .badge-active  { background: #888; }
  .badge-compulsory { background: var(--red); }
  .badge-elite { background: var(--gold); color: var(--ink); }

  .card-body { padding: 0 16px 12px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

  /* RULES TEXT */
  .rules-section { }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--parchment-dark);
  }

  .rules-text {
    font-size: 13px;
    line-height: 1.55;
    color: #2a1e0a;
    background: rgba(255,255,255,0.5);
    border-left: 3px solid var(--parchment-dark);
    padding: 8px 10px;
    border-radius: 0 4px 4px 0;
  }

  /* ANALYSIS */
  .analysis-section { }
  .analysis-body {
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink);
  }

  /* INTERACTIONS */
  .interactions { margin-top: 4px; }
  .interaction-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .chip {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 10px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .chip-beats { background: #dff0d8; color: #1a5a1a; border: 1px solid #a3d08a; }
  .chip-beaten { background: #fde8e8; color: #8a1a1a; border: 1px solid #e0a0a0; }
  .chip-synergy { background: #e8f0ff; color: #1a3a8a; border: 1px solid #a0b8e8; }
  .chip-label { font-weight: 400; opacity: 0.7; }

  .divider {
    height: 1px;
    background: var(--parchment-dark);
    margin: 4px 0;
  }

  /* NO RESULTS */
  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    padding: 60px 20px;
    display: none;
  }

  /* COUNT */
  .count-bar {
    background: rgba(0,0,0,0.3);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    text-align: center;
    padding: 6px;
    letter-spacing: 0.5px;
  }

  @media (max-width: 600px) {
    .controls { top: 68px; }
    header h1 { font-size: 20px; }
    .container { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>⚔ Blood Bowl 2025 — Skills & Traits</h1>
  <p>Third Season Edition · Source: bloodbowlbase.ru · Rules text is published text; analysis is tactical commentary</p>
</header>

<div class="controls">
  <input class="search-box" type="text" id="searchBox" placeholder="Search skills, interactions, keywords...">
  <div class="cat-btns">
    <button class="cat-btn btn-all active" onclick="filterCat('all',this)">All</button>
    <button class="cat-btn btn-ag"    onclick="filterCat('ag',this)">Agility</button>
    <button class="cat-btn btn-dev"   onclick="filterCat('dev',this)">Devious</button>
    <button class="cat-btn btn-gen"   onclick="filterCat('gen',this)">General</button>
    <button class="cat-btn btn-mut"   onclick="filterCat('mut',this)">Mutation</button>
    <button class="cat-btn btn-pas"   onclick="filterCat('pas',this)">Passing</button>
    <button class="cat-btn btn-str"   onclick="filterCat('str',this)">Strength</button>
    <button class="cat-btn btn-trait" onclick="filterCat('trait',this)">Traits</button>
  </div>
</div>

<div class="count-bar" id="countBar">Loading…</div>

<div class="container" id="cardContainer"></div>
<div class="no-results" id="noResults">No skills match your search.</div>

<script>
const SKILLS = [
// ── AGILITY ──────────────────────────────────────────────────────────────
{
  name:"Catch", cat:"ag", type:"active",
  rules:"This player may re-roll any failed Agility Test when attempting to Catch the ball.",
  analysis:"The catch re-roll is one of the most reliable safety nets in the game. It fires on every failed catch — passes, hand-offs, and kick-offs. Because a turnover from a failed catch can be catastrophic, Catch essentially converts your receiver from a ball risk into a dependable target. Essential on dedicated ball-catchers, especially those operating under marking pressure.",
  beats:["Disturbing Presence (partially)","Poor Agility roll luck"],
  beaten:["Diving Tackle (the -2 mod hits the re-roll too)","Tentacles (stops the player reaching the ball)"],
  synergy:["Pass","Accurate","Diving Catch"]
},
{
  name:"Diving Catch", cat:"ag", type:"active",
  rules:"This player may attempt to Catch the ball if it lands in a square in their Tackle Zone as a result of a Pass, Throw-in or Kick-off. They may not use this Skill to attempt to Catch the ball if it lands in a square in their Tackle Zone as a result of a Bounce. Additionally, this player may apply a +1 modifier to their Agility Test when attempting to Catch the ball as part of a Pass Action if they are in the target square.",
  analysis:"Diving Catch has two functions. The +1 modifier in the target square is modest but meaningful — it makes a 3+ catch into a 2+. The ability to grab balls landing in your Tackle Zone from passes and kick-offs creates surprise coverage opportunities. Note it does NOT work on bounces, so it won't save a bobbled ball rolling your way.",
  beats:["Inaccurate passes that still land nearby","Wide kick-offs that bounce into range"],
  beaten:["Ball landing outside Tackle Zone entirely","Bounce results (explicitly excluded)"],
  synergy:["Catch","On the Ball","Nerves of Steel"]
},
{
  name:"Diving Tackle", cat:"ag", type:"active",
  rules:"When an opposition player attempts to leave this player's Tackle Zone as a result of a Dodge, Leap or Jump, and an Agility test has been rolled and any modifiers and re-rolls have been applied, this player may use this Skill. Immediately apply a -2 modifier to the opposition player's Agility Test and place this player Prone in the square the opposition player vacated. If a player tries to leave the Tackle Zone of multiple players with this Skill at the same time, only one of those players may use this Skill.",
  analysis:"A brutal clutch skill — it fires AFTER all re-rolls are spent, making it almost always lethal. A -2 to an already-rolled Agility test usually means the opposing player is going down. However, you become Prone in the vacated square, so use it only when the dodge matters (e.g. ball carrier escaping, or critical defender running through). Devastating on Blodge players if you're using Tackle alongside it.",
  beats:["Dodge (fires after the re-roll)","Leap / Jump (all three trigger it)","High-AG dodgers who think they're safe"],
  beaten:["Stand Firm (player can't leave, so no dodge to trigger it)","Two Heads + high AG (could still pass the modified roll)"],
  synergy:["Tackle","Prehensile Tail","Shadowing"]
},
{
  name:"Dodge", cat:"ag", type:"active",
  rules:"Once per Turn, this player may re-roll a single Agility Test when attempting to Dodge. Additionally, this Skill will impact the Stumble result when an opposition player performs a Block Action against this player, as described on the Stumble rule.",
  analysis:"Dodge is arguably the best single skill in the game. It gives one free re-roll per activation AND turns a Stumble result on the block dice into a Push Back rather than a knock-down — effectively neutering opponents who rely on Stumble dice. Every piece that dodges regularly wants this. Combined with Block it creates the legendary 'Blodge' combination that is the gold standard of ball-carrier protection.",
  beats:["Stumble results on block dice","Single-fail dodge chains"],
  beaten:["Tackle (removes the Stumble protection AND stops Dodge re-roll on dodges)","Diving Tackle (fires after the re-roll is used)"],
  synergy:["Block (Blodge combo)","Sprint / Sure Feet","Two Heads"]
},
{
  name:"Defensive", cat:"ag", type:"active",
  rules:"During your opponent's Turns, opposition players Marked by this player cannot use the Guard or Put the Boot In Skills.",
  analysis:"Defensive is an anti-Guard tech skill. Guard is the single most important strength skill in the game — it creates free assists for free. A player with Defensive sitting next to a key Guard piece shuts them down completely. On defence, place your Defensive player adjacent to the opponent's best Guard piece to neutralise their entire blocking chain. Also stops Put the Boot In from assisting fouls — handy when your opponent is fouling aggressively.",
  beats:["Guard (completely cancels it while Marked)","Put the Boot In (cancels foul assists)"],
  beaten:["Guard players moving out of range before blocking","Opponent avoiding marking the Defensive player"],
  synergy:["Stand Firm","Guard (mirror denial)","Tackle"]
},
{
  name:"Hit and Run", cat:"ag", type:"active",
  rules:"When a player with this Skill performs a Block Action or a Stab Special Action, after fully resolving the Action, they may immediately move one free square ignoring Tackle Zones, so long as they are still Standing. The player must ensure that after this free move they are not Marked by or Marking any opposition players. A player with this Skill cannot also have the Frenzy Skill.",
  analysis:"Hit and Run gives a free square of movement after a block — ignoring tackle zones — as long as the move leaves you completely un-marked. The escape clause (cannot end Marking or Marked) is restrictive: it's situationally excellent but not reliable. Great on players who blitz into a cage and want to escape the resulting counter-threat. Incompatible with Frenzy, which limits who can take it.",
  beats:["Being surrounded after a key block","Multiple Tackle Zones on exit squares"],
  beaten:["Crowded fields where no 'clean' square exists (skill simply can't fire)"],
  synergy:["Block","Dodge","Dauntless"]
},
{
  name:"Jump Up", cat:"ag", type:"active",
  rules:"This Skill can be used whilst a player is Prone. A Prone player with this Skill can stand up for free without having to spend 3 squares of movement to do so. Additionally, a Prone player with this Skill can declare a Block Action whilst Prone. If they do, they must make an Agility Test, applying a +1 modifier to the result. If the Agility Test is passed, they may immediately stand up and perform the Block Action. If the Agility Test is failed, then the player remains Prone and their activation immediately ends.",
  analysis:"Jump Up's key power is the free stand-up — saving 3 squares of movement is enormous on slow players or those needing to cover ground after being knocked over. The prone Block Action is a secondary bonus: a 4+ (with +1 mod) is reliable on AG3 players, letting them blitz immediately after being knocked down last turn. Great on players who will inevitably end up prone and can't afford the movement penalty.",
  beats:["Being knocked down and needing to blitz","Movement drain from standing up"],
  beaten:["Very low Agility (the Block Action test becomes unreliable)"],
  synergy:["Block","Wrestle","Dauntless"]
},
{
  name:"Leap", cat:"ag", type:"active",
  rules:"During their Move Action, a player with this Skill can attempt to Leap over a single adjacent square regardless of what is in the square. Leaping works the same way as Jumping, with the exception that the Leaping player may reduce the negative modifiers they would receive by Leaping by 1, to a minimum of -1. A player with this Skill cannot also have the Pogo Trait.",
  analysis:"Leap allows jumping over any occupied square — players, prone bodies, crowd squares — with reduced penalties. The core use is cage-busting: Leap into the middle of an opponent's cage formation to get directly adjacent to their ball carrier. This bypasses Guard setups entirely. The minimum -1 mod means even with two Tackle Zones in the target square you still have a chance. High-risk / high-reward skill for mobile, high-agility blitzers.",
  beats:["Cage formations (jump straight in)","Guard assists on surrounding squares","Tight defensive lines"],
  beaten:["Prehensile Tail (-1 additional mod)","Very Long Legs (gives opponent +1 to intercept but doesn't stop leap itself)","Low AG making the test unreliable"],
  synergy:["Very Long Legs","Block","Dauntless"]
},
{
  name:"Safe Pair of Hands", cat:"ag", type:"active",
  rules:"If this player would be Knocked Down, Fall Over or be Placed Prone whilst in possession of the ball then, before they become Prone, they may place the ball in any adjacent unoccupied square to the square they will become Prone in instead of Bouncing the ball as normal.",
  analysis:"Ball security through and through. When your ball carrier goes down, instead of a random bounce that your opponent may catch, you place the ball in a specific adjacent square — typically adjacent to one of your own players. This largely removes the chaos of a sacked carrier. Combine with Sure Hands to make picking it back up easy. The best ball-carrier protection skill behind Dodge+Block.",
  beats:["Strip Ball (ball still placed, not Bounced)","Random bounces landing near opponents"],
  beaten:["Ball placed in an unreachable square (if all adjacent squares are occupied)","Opponent already adjacent to the placed ball"],
  synergy:["Sure Hands","Block","Dodge"]
},
{
  name:"Sidestep", cat:"ag", type:"active",
  rules:"Whenever this player is Pushed Back for any reason, then instead of the opposing Coach choosing where this player is Pushed Back to, this player's Coach may choose any adjacent unoccupied square for this player to be Pushed Back into instead. If there are no adjacent unoccupied squares, then this Skill cannot be used.",
  analysis:"Sidestep flips the Push Back result from a liability into an asset. Instead of your opponent choosing where you land (often to set up a follow-up assist or push you into the crowd), you choose. This lets you reposition defensively, avoid being pushed into the crowd, or — critically — prevent a Frenzy chain by sidstepping to break the second-block angle. Extremely powerful on sideline players.",
  beats:["Frenzy (you can sidestep to deny the second block angle)","Crowd push attempts","Opponent engineering follow-up assist positions"],
  beaten:["Grab (opponent removes you from the square rather than pushing — Sidestep doesn't fire on Grab)","No adjacent unoccupied squares (skill can't fire)"],
  synergy:["Fend (they can't follow up, you also control where you land)","Stand Firm","Dodge"]
},
{
  name:"Sprint", cat:"ag", type:"active",
  rules:"When this player performs a Move Action they may attempt to Rush one additional time than they would normally be allowed to.",
  analysis:"Sprint gives an extra Rush attempt — meaning you get 3 Rushes instead of 2 (+3 movement total if all succeed). Each Rush is still a 2+ roll, so the odds of getting all three are decent (~67% with Sure Feet on the middle roll). Sprint is most valuable on receivers or ball carriers who need that extra square to score or reach safety. Less useful on slow players where the risk of rolling a 1 and causing a turnover outweighs the gain.",
  beats:["Needing that one extra square to score","Defensive formations that plan around standard MA+2"],
  beaten:["Rolling a 1 on a Rush causing a Turnover","Being Marked (dodging out costs movement before you Rush)"],
  synergy:["Sure Feet","Dodge","Break Tackle"]
},
{
  name:"Sure Feet", cat:"ag", type:"active",
  rules:"Once per Turn, this player may re-roll a single D6 when attempting to Rush.",
  analysis:"A free re-roll on one Rush per activation. Simple but reliable. Combined with Sprint it means you effectively get a guaranteed first Rush and then Sprint gives you a third attempt. Sure Feet is very efficient — it's a free team re-roll save on a common action. Pairs naturally with Sprint and any player who regularly rushes as part of a scoring drive.",
  beats:["Rush failure causing a turnover","Tight scoring margin requiring those extra squares"],
  beaten:["Still fails on the re-roll (you only get the one re-roll)"],
  synergy:["Sprint","Break Tackle","Dodge"]
},

// ── DEVIOUS ──────────────────────────────────────────────────────────────
{
  name:"Dirty Player", cat:"dev", type:"active",
  rules:"When this player performs a Foul Action, they may apply a +1 modifier to either the Armour Roll or Injury Roll. This modifier may be applied after the roll has been made.",
  analysis:"+1 on armour OR injury (your choice, after rolling) means Dirty Player fires whether you need to crack armour or push an injury through. Applied after the roll is the key line — it's never wasted, you always see the rolls first. The most common fouling skill and fundamental to any fouling strategy. On AV7 or lower targets, even a single +1 to injury can mean the difference between Stunned and a Casualty.",
  beats:["High-AV targets (helps crack armour)","Targeting specific injury results"],
  beaten:["Sneaky Git overlap (you still get sent off on unbroken armour doubles)","Defensive (cancels Put the Boot In assists when the player with Defensive is marking)"],
  synergy:["Sneaky Git","Quick Foul","Pile Driver"]
},
{
  name:"Eye Gouge", cat:"dev", type:"active",
  rules:"When an opposition player is Pushed Back by this player, the opposition player cannot provide Offensive or Defensive Assists until after they are next activated.",
  analysis:"Eye Gouge is a disruption tool: every time you push someone back, they're locked out of assist-giving until activated. Use this on high-Guard pieces to break their ability to create assist chains for their remaining team. On a Blitz Action where you push back the opponent's key Guard player, every subsequent block your opponent makes that drive is weakened. The effect is subtle but multiplies over a series of blocks in a turn.",
  beats:["Guard-heavy setups","Teams that rely on assist-chaining blocks"],
  beaten:["Opponent activating the pushed player before making assisted blocks","POW results (the opponent is knocked down, not pushed — doesn't trigger Eye Gouge for pushes specifically)"],
  synergy:["Guard","Block","Frenzy"]
},
{
  name:"Fumblerooski", cat:"dev", type:"active",
  rules:"When this player performs a Move Action whilst they are in possession of the ball, they may choose to place the ball on the ground in any square they move out of during their Move Action. This will not cause a Turnover.",
  analysis:"Fumblerooski allows deliberate ball-dropping mid-move without turnover. The primary use is creating Hand-off-without-a-Hand-off: a carrier runs past a team-mate's square, drops the ball in that square, and the team-mate can then pick it up on their own activation. Useful for chain-passing without using your Pass Action, or for leaving the ball in a protected square while the carrier runs a decoy route.",
  beats:["Needing to pass without using your Pass Action","Creating ball distribution without PA rolls"],
  beaten:["Opponent being adjacent to the dropped ball square","Ball not being picked up and bouncing from a hit (though the drop itself is not a turnover)"],
  synergy:["Give and Go","Sure Hands","Safe Pair of Hands"]
},
{
  name:"Lethal Flight", cat:"dev", type:"active",
  rules:"When this player is thrown as part of a Throw Team-mate Action, if they land in a square that contains an opposition player, including if they Bounce into a square containing an opposition player, and the opposition player is Knocked Down, then they may apply a +1 modifier to either the Armour Roll or Injury Roll. This modifier may be applied after the roll has been made. If an opposition player suffers a Casualty as a result of being Knocked Down by the thrown player with this Skill, then this player will count as having caused that Casualty and will receive Star Player Points as appropriate. A player without the Right Stuff Trait cannot have this Skill.",
  analysis:"Lethal Flight is a throw-team-mate offensive skill for small players with Right Stuff. The thrown player becomes a living (or not) missile — when they land on/bounce into an opponent who goes down, they get Dirty Player-equivalent on the injury roll. SPP for the casualty is a bonus. This is a fouling strategy from the air: throw your snotling/goblin into the opponent's Mighty Blow player and hope for the best.",
  beats:["AV7 or lower targets — the +1 pushes injury chances up significantly","Stacked opponents who can't avoid the scatter"],
  beaten:["Failed landing scatter missing the target","Foul Appearance (opposition player may cancel the block action targeting them, though this is a landing not a Block Action per se)"],
  synergy:["Throw Team-mate","Dirty Player (SPP synergy)","Violent Innovator"]
},
{
  name:"Lone Fouler", cat:"dev", type:"active",
  rules:"When this player performs a Foul Action, if there are no players providing an Offensive or Defensive Assist, then this player may re-roll a failed Armour Roll.",
  analysis:"Lone Fouler rewards solo fouling — if you go in without any assisting players, you get a free armour re-roll. This is specifically useful for Sneaky Git users who want to foul solo to reduce the assist advantage for the ref (assists boost both sides). The re-roll on the armour roll compensates for the lack of a +1 from assists. Smart combination with Sneaky Git: foul solo, re-roll failed armour, and avoid send-off even on doubles if armour isn't broken.",
  beats:["Ref detection probability management (solo foul)","Low-AV targets where cracking armour is likely already"],
  beaten:["Opponents with high AV where you really need that assist +1 as well","Defensive (cancels the Put the Boot In assists but doesn't cancel Lone Fouler's own re-roll)"],
  synergy:["Sneaky Git","Dirty Player","Quick Foul"]
},
{
  name:"Pile Driver", cat:"dev", type:"active",
  rules:"When an opposition player is Knocked Down by this player during a Block Action, this player may perform a free Foul Action against the opposition player so long as they are still Standing and are still Marking the opposition player. This player is then Placed Prone and their activation immediately ends.",
  analysis:"Pile Driver is a one-punch + foul combo: knock them down, immediately foul, then you go prone. The foul fires without using your Foul Action for that turn, meaning your team still has its standard foul action available. The downside is you end prone — but you've already knocked them down AND fouled them. This is a high-tempo aggression tool. Combine with Dirty Player for the free foul's modifier to go to work. The timing risk is that you become prone adjacent to an opponent.",
  beats:["Burning multiple actions on one player (block + foul in one activation)","Saving the team's regular Foul Action"],
  beaten:["You end up Prone and adjacent to opponents","If the knocked down player is immediately picked up by Regeneration or a skill, the foul advantage is reduced"],
  synergy:["Dirty Player","Mighty Blow","Guard"]
},
{
  name:"Put the Boot In", cat:"dev", type:"active",
  rules:"This player can provide Offensive Assists when a team-mate performs a Foul Action regardless of how many opposition players are Marking this player.",
  analysis:"Normally an assisting player can be cancelled out by an opposing player marking them. Put the Boot In ignores this — you can assist fouls even while being heavily Marked. This is the backbone of a foul stack: your entire foul mob can assist regardless of being marked back. Every foul-focused team wants this on multiple players to guarantee large positive assist modifiers on armour rolls.",
  beats:["Opposition trying to mark out your foul assisters","Situations where the opponent can always mark all your players"],
  beaten:["Defensive (completely cancels Put the Boot In while the Defensive player Marks this player)","Being knocked down — must be Standing to assist"],
  synergy:["Dirty Player","Sneaky Git","Pile Driver"]
},
{
  name:"Quick Foul", cat:"dev", type:"active",
  rules:"This player's activation does not end after performing a Foul Action, and they may continue with their Move Action with any movement they have remaining.",
  analysis:"Quick Foul is unique: after fouling, you keep moving. Every other player ends their activation on a Foul. This lets a fast player foul mid-move, then use remaining MA to get into position or back to safety. Hugely powerful on speedy players — run in, foul a prone target, then sprint away from the scene. The player still risks sending off on doubles (unless Sneaky Git), but the ability to keep moving post-foul is rare.",
  beats:["Foul-and-escape plays","Maximising multiple actions in one activation"],
  beaten:["Being sent off still ends the activation (and the player leaves the pitch)","Defensive player Marking cancels Put the Boot In assists which limits foul quality"],
  synergy:["Sneaky Git","Dirty Player","Sprint / Sure Feet"]
},
{
  name:"Saboteur", cat:"dev", type:"active", special:"requires Secret Weapon Trait",
  rules:"When this player is Knocked Down as a result of an opposition player's Block Action, before the Armour Roll is made, they may roll a D6. On a 1–3, nothing happens and the Armour Roll is made as normal. On a 4+, this player's sabotaged weapon goes off and the opposition player is also Knocked Down, though this will not cause a Turnover unless the opposition player was holding the ball. If this player's sabotaged weapon goes off, then they are automatically Knocked Out and the Armour Roll is not made for them. A player without the Secret Weapon Trait cannot have this Skill.",
  analysis:"Saboteur is a kamikaze skill — you might take down your attacker with you, at the cost of being auto-Knocked Out. The 4+ chance is 50/50, and being KO'd is steep. However, on a player who has Secret Weapon and gets sent off at half time anyway, it's a last-ditch deterrent. The most notable use: the attacker going down doesn't cause a Turnover, so you won't waste your team's turn — unless they were holding the ball.",
  beats:["Discouraging blocks on the Saboteur player","Getting value out of a player who would be sent off at half-time anyway"],
  beaten:["50% chance of doing nothing","Auto-KO is a steep price"],
  synergy:["Secret Weapon Trait","Violent Innovator"]
},
{
  name:"Shadowing", cat:"dev", type:"active",
  rules:"Each time an opposing player attempts to Dodge out of a square within this player's Tackle Zone, this player may use this Skill. When this player uses this Skill, roll a D6. On a 1–3, nothing happens. On a 4+, this player is immediately placed into the square that the opposition player vacated. This player may only use this Skill a number of times per Turn equal to their MA.",
  analysis:"Shadowing is an active tracking mechanism — when a player dodges out of your tackle zone, you roll to teleport into the square they vacated. Success means you maintain marking on a fast, dodgy opponent. The MA limit (max uses per turn equals your MA) prevents infinite chain-shadowing but allows multiple uses on fast players. Devastating on speedy teams like Skaven or Elves who rely on dodging free each turn.",
  beats:["High-MA, dodgy players who expect to easily dodge away","Building a tackle zone that follows the ball carrier"],
  beaten:["Stand Firm (they don't dodge — no trigger)","Low roll probability (only 4+ = 50%)","Dodging into a square this player can't teleport into legally"],
  synergy:["Tackle","Diving Tackle","Prehensile Tail"]
},
{
  name:"Sneaky Git", cat:"dev", type:"active",
  rules:"This player is not Sent-off when performing a Foul Action if a natural double is rolled for the Armour Roll, so long as the target player's Armour is not broken. If the target player's Armour is broken, this player will still be sent off as normal.",
  analysis:"The key foul-safety skill. Normally, rolling a double on the armour roll gets you sent off. Sneaky Git says: you're safe on doubles IF you didn't break armour. This lets you foul freely even while fishing for high rolls, knowing a failed double won't cost you a player. The trade-off is carefully noted: if you DO break armour on a double, you still go. So if armour is broken, the ref sees you — Sneaky Git only saves you on harmless fouls.",
  beats:["Fear of being sent off preventing fouling","Fouling with high modifiers that push into double territory risk"],
  beaten:["Armour being broken on the double roll — no protection then","Defensive shutting down assists limits foul modifier quality"],
  synergy:["Dirty Player","Lone Fouler","Quick Foul"]
},
{
  name:"Violent Innovator", cat:"dev", type:"active", special:"requires Special Action Trait",
  rules:"If an opposition player suffers a Casualty as a result of a Special Action this player performed, this player will earn Star Player Points for causing a Casualty as appropriate. A player can only have this Skill if they have a Trait that allows them to perform a Special Action.",
  analysis:"Violent Innovator is purely an SPP farming skill — it gives Casualty SPP from Special Action casualties (Chainsaw, Stab, Bombardier, Breathe Fire etc.). Without it, special action casualties don't grant SPP. This is important for developing powerful players with Chainsaw or Stab traits that otherwise can't advance quickly. In a long league, the SPP difference compounds into stat upgrades or additional skills.",
  beats:["SPP starvation on Special Action players","Advancing powerful chaos/mutation players faster"],
  beaten:["Does nothing to improve actual performance — purely advancement focused"],
  synergy:["Chainsaw Trait","Stab Trait","Bombardier Trait"]
},

// ── GENERAL ──────────────────────────────────────────────────────────────
{

  analysis:"Block is the foundational blocking skill. The Both Down result — where both players risk going down — is completely neutralised: you choose not to fall, so your opponent falls while you stay standing. This turns a risky 1-die block from a liability into a manageable play. Every player who blocks regularly wants Block. The 'Blodge' combo (Block + Dodge) is the premier ball-carrier build in the game.",
  beats:["Both Down block dice result (completely negates it for you)","1-die blocks becoming safe plays","Wrestling opponents (Wrestle can still choose Both Down to drop you both, but Block + Wrestle the attacker still goes down)"],
  beaten:["Wrestle (opponent can choose Both Down to place both prone — Block cannot stop Wrestle's Both Down)","Foul Appearance (may cancel the block action before dice are rolled)"],
  synergy:["Dodge (Blodge)","Mighty Blow","Guard"]
},
{
  name:"Dauntless", cat:"gen", type:"active",
  rules:"When a player with this Skill performs a Block Action against an opposition player with a higher Strength Characteristic (before any modifiers are applied to either player), this player may roll a D6 and add their own Strength Characteristic. If the result is higher than the opposition player's unmodified Strength Characteristic, then this player increases their unmodified Strength Characteristic to match the opposition player for the duration of the Block Action. Modifiers are then applied as normal. If this player also has a Skill that allows them to perform multiple Block Actions, such as the Frenzy Skill, then they must make a separate roll for each Block Action.",
  analysis:"Dauntless lets weaker players punch up against big guys. Roll D6 + your ST: if it beats the opponent's ST, you match their strength for that block. Against ST5 players, a ST3 player needs 3+ on the die — that's 67% chance to match strength. This makes small-but-skilled players competitive against Trolls, Ogres, and Mummies. Key limitation: it's based on unmodified ST, so Guard on your side doesn't help trigger it — it resolves on base stats, then mods apply.",
  beats:["Big guys with high Strength but poor skills","Strength 5+ players where you'd otherwise block at disadvantage"],
  beaten:["Juggernaut (Juggernaut on a Blitz negates Fend and can count Both Down as a Push — Dauntless still rolls but the block results differ)","Guard stacking reducing the value of matching strength (you matched, but they still have more assists)"],
  synergy:["Block","Frenzy","Jump Up"]
},
{
  name:"Fend", cat:"gen", type:"active",
  rules:"When a player with this Skill is Pushed Back as a result of a Block Action performed against them, then the opposition player may not Follow-up. This Skill cannot be used against a player with the Ball & Chain Trait or against a player with the Juggernaut Skill that is performing a Blitz Action.",
  analysis:"Fend prevents the Follow-up after a Push Back. This is critical against Frenzy players — if you get Pushed Back (not knocked down), Frenzy requires Follow-up, but Fend stops it. No Follow-up means no second block. It also breaks the positioning game: pushes are used to set up assisting positions, and Fend denies that. Note the hard counters: Ball & Chain ignores it, and Juggernaut on a Blitz Action ignores it.",
  beats:["Frenzy (denies the mandatory Follow-up, breaking the second block)","Positioning pushes — opponent can't chase you"],
  beaten:["Juggernaut on a Blitz Action (explicitly bypasses Fend)","Ball & Chain (explicitly bypasses Fend)","Knockdown results (Fend only triggers on Push Back, not POW)"],
  synergy:["Sidestep","Stand Firm","Dodge"]
},
{
  name:"Frenzy", cat:"gen", type:"active", compulsory:true,
  rules:"Every time this player performs a Block Action, if the target is Pushed Back, then this player must Follow-up if able. Additionally, if after the target is Pushed Back they are still Standing, then this player must perform a second Block Action targeting the same opposition player and must again Follow-up if the target is Pushed Back. If this player is performing a Blitz Action, performing a second Block Action will also cost the player a square of movement. If this player has no movement left, then they must Rush. If this player cannot Rush then they cannot perform the second Block Action. A player with this Skill cannot have the Grab, Hit & Run or Multiple Block Skills.",
  analysis:"Frenzy is a double-edged sword: enormous offensive pressure, but the compulsory Follow-up is a trap waiting to happen. Frenzy players will gladly follow opponents into the crowd, follow up into a marked square, or chain into dangerous terrain. The second block creates extra damage potential but also extra dice rolls that could Turnover. Manage Frenzy carefully — push opponents toward the sideline rather than toward your own half. Cannot combine with Grab, Hit & Run, or Multiple Block.",
  beats:["Crowd-pushing strategies (follow into sideline)","Wearing down opponents across two blocks per activation"],
  beaten:["Sidestep (opponent chooses push direction, can deny second block angle)","Fend (stops the Follow-up, ending the Frenzy chain)","Opponent engineering a POW on the second block to hurt you back"],
  synergy:["Mighty Blow","Block","Juggernaut"]
},
{
  name:"Kick", cat:"gen", type:"active",
  rules:"If this player is nominated as the kicking player, then when kicking Deviates this player's Coach may choose for it to only Deviate D3 squares rather than the usual D6.",
  analysis:"Kick gives kick control — D3 deviation instead of D6 means kicks can be placed much more accurately. A kick that deviates up to 3 squares rather than 6 can reliably land in a dangerous zone for your opponent. The best kickoff strategy is putting the ball in a 'coffin corner' where it's hard to reach and you're positioned to blitz the receiver. Kick dramatically improves your ability to execute this plan.",
  beats:["Random kick deviation ruining coffin corner plans","Opponent receiving an easy, centered kick"],

},
{
  name:"Pro", cat:"gen", type:"active",
  rules:"During this player's activation, they may attempt to re-roll a single dice. This can be a dice roll on its own, as part of a multiple dice roll or as a dice pool. To use this Skill, the player must roll a D6: on a 3+ the dice may be re-rolled, on a 1-2 the dice may not be re-rolled. The Skill cannot be used to re-roll a dice made as part of an Armour Roll, Injury Roll, Casualty roll, a roll made outside of the player's activation, or any dice roll not made on the player's behalf (such as Argue the Call or if the Crowd Takes Action). Once a player has attempted to use this Skill, they cannot use a re-roll from any other source to re-roll the dice.",
  analysis:"Pro is a flexible but unreliable re-roll. The 3+ requirement means it only works 67% of the time — and failing to get the re-roll costs the action without any benefit. It can apply to any die roll in your activation, making it broadly applicable. Most useful when Team Re-rolls are exhausted. The key limiter: it does NOT save re-rolls from other sources — it replaces them. Once you declare Pro, you can't then use a Team Re-roll if Pro fails.",
  beats:["Having a catch-all re-roll when Team Re-rolls are gone","Applying to unusual dice rolls that specific skills don't cover"],
  beaten:["2-in-6 chance of doing nothing (worse than a straight Team Re-roll)","Burning a Pro attempt and still failing the re-roll wastes both"],
  synergy:["Leader","Any high-value activation player"]
},
{
  name:"Steady Footing", cat:"gen", type:"active",
  rules:"Whenever this player would be Knocked Down or Fall Over, roll a D6. On a 6, this player does not get Knocked Down or Fall Over. If this happens during their activation, they may continue their activation as normal and no Turnover will be caused.",

  beaten:["Low probability — fires only 1-in-6 times","Doesn't help if the knockdown happens outside your activation (no Turnover would occur then anyway)"],

{
  name:"Strip Ball", cat:"gen", type:"active",
  rules:"When this player performs a Block Action against an opposition player holding the ball, if an opposition player is Pushed Back then they will drop the ball in the square they are Pushed Back into, at which point it will Bounce from that square. This Bounce will happen before the opposition player becomes Prone (if applicable) but after this player chooses to Follow-up.",
  analysis:"Strip Ball forces a fumble on a Push Back result — even without a knockdown. This is hugely significant: a Push Back is a very common block result, and normally doesn't produce a turnover. With Strip Ball, every push against the ball carrier becomes a ball-loosening event. The ball Bounces from the pushed square, which may land anywhere. Great against sure-handed carriers. Note: Sure Hands completely counters Strip Ball.",

  synergy:["Tackle","Frenzy","Block"]

{

  analysis:"Sure Hands does two things: re-roll on picking up the ball, and immunity to Strip Ball. The pick-up re-roll is essential for reliable ball retrieval — the most common cause of early-turn Turnovers is fumbling the pick-up. The Strip Ball immunity means aggressive push-block strategies won't dislodge your carrier. Every team's primary ball carrier should either have Sure Hands or have a low pick-up roll naturally. Don't put the ball in anyone's hands without it.",

  analysis:"Tackle is the hard counter to the Dodge skill. Without Tackle, a Dodge player can re-roll failed dodges AND turns Stumble into a mere Push Back. With Tackle, both advantages disappear. Against Elves, Dark Elves, Amazons, Halflings, or any Dodge-heavy team, Tackle is mandatory on your blitzers. Even one Tackle player on a team forces the opponent to calculate dodges very differently. The meta impact of Tackle on Dodge-based strategies cannot be overstated.",

  synergy:["Block","Diving Tackle","Strip Ball"]
},
{

{

{
  name:"Monstrous Mouth", cat:"mut", type:"active",
  rules:"When this player is activated, they may declare a Chomp Special Action; there is no limit to the number of players that can declare this Special Action each Turn. When this player declares a Chomp Special Action, they may select one Standing opposition player they are Marking and roll a D6. On a 1-2 nothing happens. On a 3+, the opposition player is considered to be Chomped. Whilst Chomped, the opposition player cannot leave the square they are in whilst this player remains Marking them. This condition ends immediately if this player is no longer Marking the opposition player for any reason. This player may use the Chomp Special Action to replace the Block Action made as part of a Blitz Action if they wish. Additionally, the Strip Ball Skill cannot be used against this player.",
  analysis:"Monstrous Mouth Chomps a target on 3+ — while Chomped they cannot leave their square whilst being Marked. This is essentially a hard-lock on any Standing player: your Monstrous Mouth player marks them, Chomps them, and they are frozen until you release or get knocked over. The Strip Ball immunity is a useful secondary benefit for carriers. Chomp is most powerful on fast, mobile opponents who rely on dodging free — they simply can't.",

  synergy:["Tentacles","Tackle","Prehensile Tail"]
},
{
  name:"Prehensile Tail", cat:"mut", type:"active",

  analysis:"Prehensile Tail passively applies -1 to Dodge, Jump, and Leap attempts away from your Tackle Zone. It doesn't do anything on its own but multiplies with other negative modifiers. Stack multiple PT players near an opponent and they're looking at -2 or -3 to their agility test (though only one PT fires per leave attempt). Against an AG3 player: a -1 turns a standard 4+ dodge into a 5+ — significantly increasing turnover risk. Only one PT can apply per dodge, even if multiple PT players are Marking.",

  beaten:["Only one Prehensile Tail fires per dodge attempt (multiple PT players don't stack)","Players with Two Heads (+1 to dodge, can offset the penalty)","Very long legs (+1 to jump/leap, partially offsets)"],
  synergy:["Tentacles","Diving Tackle","Tackle"]
},
{
  name:"Tentacles", cat:"mut", type:"active",
  rules:"When an opposition player attempts to Dodge, Jump or Leap away from a square in this player's Tackle Zone, this player may use this Skill. When a player uses this Skill they roll a D6 and add their Strength characteristic to the roll; they then subtract the Strength Characteristic of the opposition player from the result. If the result is 6 or higher, or the roll is a natural 6, then the opposition player does not leave the square they attempted to leave and their activation comes to an end. If the result is 5 or lower, or the roll is a natural 1, this Skill has no effect. If a player tries to leave the Tackle Zone of multiple players with this Skill at the same time, only one of those players may use this Skill.",
  analysis:"Tentacles is a combat Grapple — you roll D6 + your ST - their ST: on 6+, their activation ends and they're stuck. A ST4 Tentacles player vs a ST3 opponent: you need 5+ (55.6%). Against ST2 opponents that's 4+ (66.7%). Like Prehensile Tail, only one Tentacles fires per escape attempt. The massive difference from Prehensile Tail: Tentacles completely ends the opponent's activation on success — they can't even declare a different action.",
  beats:["Highly mobile ball carriers (activation ended = no scoring threat that turn)","Dodge-based teams (fires on any dodge away)"],
  beaten:["High-ST opponents — a ST5 player vs your ST4 Tentacles needs 5+ (same odds reversed)","Natural 1 always fails","Only one Tentacles fires per dodge"],
  synergy:["Monstrous Mouth","Prehensile Tail","Stand Firm"]
},
{
  name:"Two Heads", cat:"mut", type:"active",
  rules:"This player may apply a +1 modifier to the Agility Test whenever they attempt to Dodge.",
  analysis:"+1 to all Dodge attempts — elegant simplicity. Turns a 4+ dodge into a 3+, or a 3+ into a 2+. When combined with Dodge (the skill), this player has a re-roll AND a +1 modifier, making them incredibly hard to mark down. An AG4, Two Heads, Dodge player dodges on 2+... with a re-roll. You need Diving Tackle or Prehensile Tail to even slow them down. Perfect for agile ball carriers and screens.",

  beaten:["Tackle (removes Dodge re-roll and Stumble protection — Two Heads +1 remains but re-roll is gone)","Diving Tackle (fires after re-rolls, -2 is brutal even with +1)"],
  synergy:["Dodge","Sprint","Leap"]
},
{
  name:"Very Long Legs", cat:"mut", type:"active",
  rules:"This player may apply a +1 modifier to the Agility Test whenever they attempt to Leap or Jump, and may apply a +2 modifier to the Agility Test whenever they attempt to Intercept the ball. Additionally, this player ignores the Cloud Burster Skill.",
  analysis:"+1 to Leap/Jump and +2 to Interceptions, plus Cloud Burster immunity. The interception bonus is the headline — +2 makes interceptions far more viable than normally. An AG3 player needs 6+ to intercept normally; with VLL they need 4+. Combined with the Leap bonus, VLL players are cage-busters who can also threaten passing lanes. Cloud Burster bypass is a niche but powerful meta-call against Skaven teams that use Cloud Burster.",

{

  rules:"Whenever an opposition player attempts to perform a Block Action against this player, or a Special Action that targets this player directly, this player may use this Skill. When they do, this player may immediately perform a Quick Pass before the Action targeting them is resolved. This Quick Pass cannot cause a Turnover, but otherwise follows all the normal rules for making a Quick Pass. Once the Quick Pass has been resolved, this Action targeting this player continues.",
  analysis:"Dump-Off is a reactive Quick Pass when someone blitzes you. It fires before the block is resolved. Critical use: your carrier gets blitzed, you Dump-Off to an open teammate before being hit — even if you then drop the ball, the teammate already has it. Since the Dump-Off quick pass can't cause a Turnover by itself, a fumble just leaves the ball on the ground rather than ending your turn. Fantastic anti-blitz protection. The block still resolves after.",

  synergy:["Nerves of Steel","Pass","Safe Pair of Hands"]

{
  name:"Give and Go", cat:"pas", type:"active",
  rules:"If this player performs a Pass Action that is a Quick Pass, or performs a Hand-off Action, then, so long as a Turnover isn't caused, their activation does not end once the Pass or Hand-off is resolved. Instead, they may continue with their Move Action using any movement they have remaining.",
  analysis:"Give and Go lets your thrower keep moving after a Quick Pass or Hand-off. This is a tempo skill: pass to a nearby player, then continue running to a blocking or positioning role. It turns a Thrower from a stationary passer into an active participant every turn. Excellent for screens and short-game teams — pass the ball, then move into a Guard or support position rather than standing still.",

{
  name:"Leader", cat:"pas", type:"passive",
  rules:"A team that has one or more players with the Leader Skill on the pitch at the start of a half may gain a single extra Team Re-roll - this is called a Leader Re-roll. A team can only use a Leader Re-roll if they have a player with the Leader Skill on the pitch, and if all players with this Skill are removed from play, either as a Casualty or by being Sent-off, before the Leader Re-roll is used then it is lost. A Leader Re-roll follows all of the usual rules for standard Team Re-rolls, with the exception that it cannot be lost as a result of a Halfling Master Chef.",

{

  analysis:"Stunty is a mixed bag: -1 to dodge tests AND opponents get a block dice re-roll against you. Stunty players are squishy and dodgy simultaneously. The corridor sight bonus is minor but occasionally useful for bounce-pass plays through crowds. Stunty players are inherently fragile and should be positioned to avoid direct blocks where possible. Their strength lies in numbers, fouling, and chaos rather than surviving hits.",

  beaten:["Every block against you has a free re-roll — high injury risk","Dodge penalty (-1) means even dodging away is unreliable"],

{
  name:"Swoop", cat:"trait", type:"active",
  rules:"When this player is thrown as part of a Throw Team-mate Action, this player may choose where they land rather than the throw deviating as normal. When using this Skill, this player must land on a valid square within the Range of the throw, following all the normal rules for landing.",
  analysis:"Swoop is Bullseye from the thrown player's perspective — the thrown player chooses their landing square within range, eliminating deviation. Unlike Bullseye (which is on the thrower), Swoop is on the thrown player. Combined, they create double landing certainty. Swoop players are self-directing projectiles — throw them, they land exactly where needed. Scoring from a throw becomes deterministic within the range limit.",
  beats:["Deviation risk from Throw Team-mate","Needing precision placement when thrown"],
  beaten:["Must land within the throw's Range — long throws still limited by distance","Landing roll still required — high AG needed for reliable landings"],
  synergy:["Bullseye (combined = maximum throw precision)","Strong Arm","Right Stuff"]
},
{
  name:"Take Root", cat:"trait", type:"passive", compulsory:true,
  rules:"Whenever this player is activated, after declaring their action, they must roll a D6. On a 1, this player becomes Rooted. A Rooted player cannot move, and cannot perform any action that includes a Move or a Special Action, but may still perform Block and Foul Actions. Additionally, a Rooted player cannot be pushed in any direction for any reason, and are therefore immune to being pushed into the crowd. A player that has been Rooted will remain Rooted until they are Activated again, at which point they may attempt to Uproot themselves by rolling a D6. On a 2+, they become un-Rooted. On a 1, they remain Rooted.",
  analysis:"Take Root on a 1-in-6 means the player becomes immovable but also immobile. Rooted players can Block and Foul but not move. The immunity to pushes while Rooted is a significant defensive upside: they cannot be crowd-pushed, cannot be Grabbed, and Sidestep/Stand Firm are irrelevant since they won't move anyway. A Rooted Tree-man is an immovable Guard anchor — annoying rather than disabled on defence.",
  beats:["Crowd push attempts (Rooted = immune to being pushed into crowd)","The player still provides Tackle Zones and can Block — functional on defence"],

{
  name:"Throw Team-Mate", cat:"trait", type:"active",
  rules:"Once per turn, this player may perform a Throw Team-mate Action, following the rules for throwing a player. A player with this Trait that also has the Kick Team-mate Trait will kick rather than throw their team-mate.",
  analysis:"Throw Team-mate is one of Blood Bowl's most unique mechanics. A big guy with TTM can launch a Right Stuff player across the pitch — scoring from seemingly impossible positions, assassinating key opponents, or fouling from the air. The TTM action follows PA rules with its own modifiers. The threat of TTM forces opponents to consider deep coverage even on short drives. Always Hungry complicates the use of TTM for its owner.",
  beats:["Short-reach defences (throw over the top)","Impossible scoring positions (throw right to the endzone)"],
  beaten:["Always Hungry (1-in-6 self-eat)","Failed PA test causes deviation — the thrown player can land anywhere","Target must have Right Stuff and not Insignificant"],

{
  name:"Timmm-Ber!", cat:"trait", type:"passive",
  rules:"If this player is ever Knocked Down or Falls Over, this player is placed in the square they were in when they were knocked down or fell over, but also in all adjacent occupied squares. This player is placed Prone in the square they were originally in, and all players in adjacent squares, friend or foe, are Placed Prone and must make an Armour Roll.",
  analysis:"Timmm-Ber! is the Treeman's falling hazard. When the Treeman goes down, everyone adjacent is also knocked Prone and takes an armour roll. This turns every successful block on the Treeman into a mutual destruction event — and even falling over on a Rush can clear adjacent opponents. The downside is your own players can be hit too. Use Timmm-Ber! Treemen as defensive anchors rather than sitting them near your own key pieces.",
  beats:["Packed opponent formations around the Treeman (they all take armour rolls when it falls)","Opponents blocking a Treeman — they risk hurting their own players"],
  beaten:["Your own players adjacent to the Treeman also suffer armour rolls","The Treeman must actually fall — predictable if well protected"],
  synergy:["Guard (Treeman is valuable adjacent to blocks)","Take Root (Rooted Treeman is hard to knock over)"]

{
  name:"Titchy", cat:"trait", type:"passive", compulsory:true,
  rules:"This player applies a -1 modifier to the dice roll of any player attempting to Dodge into, out of, or through their Tackle Zone. This modifier is applied in addition to any other modifiers. Additionally, this player cannot hold the Offensive or Defensive positions when setting up for a Kick-off.",
  analysis:"Titchy applies -1 to opponents dodging into, out of, or through your Tackle Zone (not just escaping from it — into it also). Stack Titchy with Prehensile Tail for -2 total. The kick-off restriction prevents Titchy players from lining up on the Line of Scrimmage offensively or defensively. They must be in the wide zones or reserve — a notable placement restriction. A Titchy swarm can create a surprisingly difficult dodge-penalty web.",

  analysis:"Unsteady means rolling a 1 after any Block/Blitz action causes the player to collapse and take an armour roll. This is a self-damage risk on the team's most common actions. Unsteady players should never be used for casual blocks — every block carries a 1-in-6 chance of the player hurting themselves. High-AV Unsteady pieces are less affected (they may crack their own armour less often). Reserve blocks for critical moments.",

// ── APP LOGIC ──────────────────────────────────────────────────────────────

let activeFilter = 'all';

function catClass(c) {
  const m = {ag:'ag',dev:'dev',gen:'gen',mut:'mut',pas:'pas',str:'str',trait:'trait'};
  return m[c] || 'gen';
}

function buildCards() {
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';
  SKILLS.forEach((s, idx) => {
    const cc = catClass(s.cat);
    const catLabel = {ag:'Agility',dev:'Devious',gen:'General',mut:'Mutation',pas:'Passing',str:'Strength',trait:'Trait'}[s.cat];

    const chipsHtml = (label, arr, cls) => {
      if (!arr || !arr.length) return '';
      return `<div class="interaction-chips">
        <span class="chip-label" style="font-size:11px;color:var(--muted);font-style:italic;">${label}:</span>
        ${arr.map(x=>`<span class="chip chip-${cls}">${x}</span>`).join('')}
      </div>`;
    };

    const card = document.createElement('div');
    card.className = 'skill-card';
    card.dataset.cat = s.cat;
    card.dataset.search = (s.name + ' ' + s.rules + ' ' + (s.analysis||'') + ' ' + (s.beats||[]).join(' ') + ' ' + (s.beaten||[]).join(' ') + ' ' + catLabel).toLowerCase();

    card.innerHTML = `
      <div class="card-header" style="background:${cc==='ag'?'#e8f4fc':cc==='dev'?'#f4e8f4':cc==='gen'?'#e8f4e8':cc==='mut'?'#fdf0e0':cc==='pas'?'#e8eef8':cc==='str'?'#fde8e8':'#eeeef8'};">
        <div class="card-header-left">
          <div class="skill-name">${s.name}${s.compulsory?'&thinsp;<span style="color:#9b1f1f;font-size:14px;" title="Compulsory">✱</span>':''}</div>
          <div class="skill-meta">
            <span class="badge badge-${cc}">${catLabel}</span>
            <span class="badge badge-${s.type}">${s.type.charAt(0).toUpperCase()+s.type.slice(1)}</span>
            ${s.compulsory?'<span class="badge badge-compulsory">Compulsory</span>':''}
            ${s.special?`<span class="badge" style="background:#444;">${s.special}</span>`:''}
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="rules-section">
          <div class="section-label">Rules text (bloodbowlbase.ru)</div>
          <div class="rules-text">${s.rules}</div>
        </div>
        <div class="analysis-section">
          <div class="section-label">Tactical analysis</div>
          <div class="analysis-body">${s.analysis}</div>
        </div>
        <div class="interactions">
          <div class="section-label">Interactions</div>
          ${chipsHtml('Beats / Counters', s.beats, 'beats')}
          ${chipsHtml('Beaten by', s.beaten, 'beaten')}
          ${chipsHtml('Synergises with', s.synergy, 'synergy')}
        </div>
      </div>`;
    container.appendChild(card);
  });
  updateCount();
}

function filterCat(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  let visible = 0;
  document.querySelectorAll('.skill-card').forEach(card => {
    const catOk = activeFilter === 'all' || card.dataset.cat === activeFilter;
    const searchOk = !q || card.dataset.search.includes(q);
    const show = catOk && searchOk;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
  updateCount(visible);
}

function updateCount(n) {
  const total = SKILLS.length;
  const showing = n !== undefined ? n : total;
  document.getElementById('countBar').textContent = showing === total
    ? `Showing all ${total} Skills & Traits`
    : `Showing ${showing} of ${total} Skills & Traits`;
}

document.getElementById('searchBox').addEventListener('input', applyFilters);

buildCards();
</script>
